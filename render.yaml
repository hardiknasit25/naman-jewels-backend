# Render Blueprint — deploys this Express API as a normal long-running Node
# service (no serverless). In Render: New + → "Blueprint" → pick this repo, and
# it reads these settings automatically. Secrets (sync: false) are entered once
# in the Render dashboard, never committed.
services:
  - type: web
    name: naman-jewels-api
    runtime: node
    plan: free
    # --include=dev forces devDependencies (TypeScript lives there) to install
    # even though NODE_ENV=production, which npm would otherwise skip.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://naman-jewels-frontend.vercel.app
      # Secrets — set these in the Render dashboard (marked "sync: false" so they
      # are never stored in git).
      - key: JWT_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
